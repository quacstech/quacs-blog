{{ define "main" }}
<article>
  <div class="article-meta">{{ .Date.Format "2006-01-02" }} &nbsp;·&nbsp; {{ .File.Dir }}</div>
  <h1 class="article-title">{{ .Title }}</h1>
  {{ with .Params.description }}
  <p class="article-desc">{{ . }}</p>
  {{ end }}
  <hr>
  {{ with .Params.tags }}
<div class="article-tags" style="margin-bottom: 24px;">
  {{ range . }}<a href="/tags/{{ . | urlize }}" class="tag">{{ . }}</a>{{ end }}
</div>
{{ end }}
  <div class="article-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
