<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="/index.xml">
</head>
<body>

  <header>
    <div class="site-title">
     <img src="/images/duck.svg" alt="QuACS duck" class="site-logo">
      QuACS<span>.tech</span>
    </div>
    <nav>
      <ul class="top-nav">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </header>

  <div class="body-wrap">
    <aside class="sidebar">
      <div class="sidebar-label">topics</div>
      <ul class="sidebar-nav">
        {{ range .Site.Menus.sidebar }}
        <li><a href="{{ .URL }}" {{ if hasPrefix $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
      <input class="search-box" id="search-input" type="text" placeholder="search..." />
      <div id="search-results"></div>
    </aside>

    <main>
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  <footer>
    <span>plain html · no tracking · no cookies</span>
    <a href="/index.xml">rss feed</a>
  </footer>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
  let fuse;
  fetch("/index.json")
    .then(r => r.json())
    .then(data => {
      const unique = Array.from(
        new Map(data.map(item => [item.url, item])).values()
      );
      fuse = new Fuse(unique, {
        keys: ["title", "description", "content"],
        threshold: 0.4,
        minMatchCharLength: 2
      });
    });

  document.getElementById("search-input").addEventListener("input", function () {
    const query = this.value.trim();
    const box = document.getElementById("search-results");
    if (!query || !fuse) { box.innerHTML = ""; return; }
    const results = fuse.search(query).slice(0, 8);
    box.innerHTML = results.map(r => `
      <a href="${r.item.url}" class="search-result-item">
        <div class="search-result-title">${r.item.title}</div>
        <div class="search-result-meta">${r.item.section}</div>
      </a>
    `).join("");
  });
</script>
<script>
  document.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'copy';
    pre.style.position = 'relative';
    pre.appendChild(btn);
    btn.addEventListener('click', () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.textContent : pre.textContent);
      btn.textContent = 'copied';
      setTimeout(() => btn.textContent = 'copy', 2000);
    });
  });
</script>
</body>
</html>
