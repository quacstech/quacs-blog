{{ define "main" }}
<article>
  <div class="article-meta">{{ .Date.Format "2006-01-02" }}</div>
  <h1 class="article-title">{{ .Title }}</h1>
  {{ with .Params.description }}
  <p class="article-desc">{{ . }}</p>
  {{ end }}
  <hr>
  <div class="article-body digest-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
