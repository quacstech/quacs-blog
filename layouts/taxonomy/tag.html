{{ define "main" }}
<div class="section-title">tag: {{ .Title }} — {{ len .Pages }} articles</div>
<div class="article-list">
  {{ range .Pages.ByDate.Reverse }}
  <a href="{{ .RelPermalink }}" class="article-item">
    <div class="article-meta">{{ .Date.Format "2006-01-02" }} &nbsp;·&nbsp; {{ .File.Dir }}</div>
    <div class="article-title">{{ .Title }}</div>
    {{ with .Params.description }}<div class="article-desc">{{ . }}</div>{{ end }}
    <div class="article-tags">
      {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
